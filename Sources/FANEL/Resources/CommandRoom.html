<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FANEL 指令室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text-dim:#9CA3AF;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;--orange:#f0883e;--cyan:#39d353;--fs-base:12px;--fs-task:13px;--fs-log:12px;--fs-sidebar:11px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
header h1{font-size:16px;font-weight:600}
.header-badges{display:flex;gap:10px;align-items:center}
.status-badge{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-dim)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--red)}
.status-dot.ok{background:var(--green)}
.hb-badge{font-size:10px;padding:1px 6px;border-radius:3px}
.hb-badge.online{background:rgba(63,185,80,0.15);color:var(--green)}
.hb-badge.offline{background:rgba(248,81,73,0.12);color:var(--red)}
.tb-badge{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(57,211,83,0.15);color:var(--cyan)}
main{flex:1;display:grid;grid-template-columns:220px 1fr;grid-template-rows:minmax(120px,40%) 1fr auto;gap:0;overflow:hidden}
@media(max-width:768px){main{grid-template-columns:1fr;grid-template-rows:auto auto auto 1fr auto}.sidebar{grid-row:auto}}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:10px;overflow-y:auto;grid-row:1/3;display:flex;flex-direction:column;gap:12px;font-size:var(--fs-sidebar)}
.sidebar h2{font-size:10px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;letter-spacing:0.5px}
.project-item{padding:6px 8px;border-radius:4px;margin-bottom:2px;cursor:pointer;border-left:3px solid transparent}
.project-item:hover{background:var(--border)}
.project-item.active{border-left-color:var(--green);background:rgba(63,185,80,0.06)}
.project-item .name{font-size:12px;font-weight:500}
.project-item .p-status{font-size:8px;padding:1px 4px;border-radius:3px;margin-left:4px}
.project-item .p-status.active{background:rgba(63,185,80,0.2);color:var(--green)}
.project-item .p-status.idle{background:rgba(139,148,158,0.1);color:var(--text-dim)}
.project-item .path{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-edit{padding:8px;border-radius:4px;margin-bottom:2px;background:var(--bg);border:1px solid var(--accent)}
.project-edit input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:4px 6px;color:var(--text);font-size:11px;outline:none;margin-bottom:4px}
.project-edit input:focus{border-color:var(--accent)}
.project-edit .pe-buttons{display:flex;gap:4px;margin-top:4px}
.project-edit .pe-buttons button{font-size:9px;padding:3px 8px;border-radius:3px;border:none;cursor:pointer}
.pe-save{background:var(--green);color:#fff}
.pe-cancel{background:var(--border);color:var(--text)}
.pe-delete{background:var(--red);color:#fff}
.pe-activate{background:var(--accent);color:#fff}
.model-edit{padding:8px;border-radius:4px;margin-bottom:2px;background:var(--bg);border:1px solid var(--accent);font-size:10px}
.model-edit input,.model-edit select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:3px 5px;color:var(--text);font-size:10px;outline:none;margin-bottom:3px}
.model-edit .me-buttons{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.model-edit .me-buttons button{font-size:8px;padding:2px 6px;border-radius:3px;border:none;cursor:pointer}
.badge{display:inline-block;font-size:10px;padding:1px 4px;border-radius:8px}
.badge.active{background:rgba(63,185,80,0.22);color:var(--green)}
.badge.idle{background:rgba(139,148,158,0.22);color:var(--text-dim)}
.model-item{padding:4px 6px;border-radius:3px;margin-bottom:2px;background:var(--bg);font-size:10px;border-left:2px solid var(--text-dim)}
.model-item.layer1{border-left-color:var(--green)}.model-item.layer2{border-left-color:var(--accent)}.model-item.layer3{border-left-color:var(--orange)}.model-item.layer4{border-left-color:var(--purple)}
.model-item .m-head{display:flex;justify-content:space-between}
.model-item .m-name{font-weight:500}.model-item .m-layer{font-size:8px;opacity:0.7}
.tb-item{padding:4px 6px;border-radius:3px;margin-bottom:2px;background:var(--bg);font-size:10px;border-left:2px solid var(--cyan)}
.tb-item .tb-head{display:flex;justify-content:space-between}
.tb-item .tb-name{font-weight:500}.tb-item .tb-count{color:var(--text-dim);font-size:9px}
.tb-item .tb-desc{color:var(--text-dim);font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-panel{border-bottom:1px solid var(--border);overflow-y:auto;padding:8px 12px}
.task-panel h2{font-size:10px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;letter-spacing:0.5px}
.task-item{padding:6px 8px;border-radius:4px;margin-bottom:4px;background:var(--surface);border-left:3px solid var(--text-dim);font-size:var(--fs-task)}
.task-item.running{border-left-color:var(--yellow)}.task-item.complete{border-left-color:var(--green)}.task-item.error{border-left-color:var(--red)}.task-item.waiting,.task-item.draft{border-left-color:var(--accent)}.task-item.waitingForCouncil{border-left-color:var(--purple)}.task-item.waitingForUser{border-left-color:var(--yellow)}
.task-item .task-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.task-item .task-goal{font-weight:500;font-size:11px}
.task-item .task-status{font-size:10px;padding:1px 4px;border-radius:2px}
.task-status.running{background:rgba(210,153,34,0.22);color:var(--yellow)}.task-status.complete{background:rgba(63,185,80,0.22);color:var(--green)}.task-status.error{background:rgba(248,81,73,0.22);color:var(--red)}.task-status.waitingForCouncil{background:rgba(188,140,255,0.22);color:var(--purple)}.task-status.waitingForUser{background:rgba(210,153,34,0.22);color:var(--yellow)}
.task-item .task-msg{color:var(--text-dim);font-size:10px;margin-top:1px;word-break:break-all;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;cursor:pointer}
.task-item .task-msg.expanded{-webkit-line-clamp:unset;display:block;background:rgba(88,166,255,0.04);padding:6px;border-radius:4px;font-family:"SF Mono",SFMono-Regular,Consolas,monospace;white-space:pre-wrap}
.toolbox-hit{color:var(--cyan);font-size:10px;font-weight:500;margin-top:2px}
.council-info{margin-top:4px;padding:4px 6px;border-radius:3px;background:rgba(188,140,255,0.06);border:1px solid rgba(188,140,255,0.1);font-size:9px}
.council-info .ci-label{color:var(--purple);font-weight:500}
.council-info .ci-row{color:var(--text-dim)}
.question-box{margin-top:4px;padding:5px;border-radius:3px;background:rgba(210,153,34,0.08);border:1px solid rgba(210,153,34,0.15)}
.question-box .q-text{color:var(--yellow);font-size:10px;margin-bottom:4px;white-space:pre-wrap}
.question-box .q-input{display:flex;gap:4px}
.question-box input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:3px 6px;color:var(--text);font-size:10px;outline:none}
.question-box button{font-size:9px;padding:3px 8px;border-radius:3px;border:none;cursor:pointer;background:var(--yellow);color:#000;font-weight:500}
.content{display:flex;flex-direction:column;overflow:hidden}
.logs{flex:1;padding:10px 12px;overflow-y:auto;font-family:"SF Mono",SFMono-Regular,Consolas,monospace;font-size:var(--fs-log);line-height:1.5}
.log-entry{padding:1px 0;display:flex;gap:5px}
.log-entry .time{color:var(--text-dim);white-space:nowrap;min-width:60px}
.log-entry .level{min-width:44px;text-align:center;font-size:8px;padding:1px 2px;border-radius:2px;align-self:flex-start;margin-top:1px}
.level.info{background:rgba(88,166,255,0.15);color:var(--accent)}.level.warning{background:rgba(210,153,34,0.15);color:var(--yellow)}.level.error{background:rgba(248,81,73,0.15);color:var(--red)}
.log-entry .msg{word-break:break-all}
.log-entry .msg.toolbox-msg{color:var(--cyan);font-weight:500}
.input-area{border-top:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;grid-column:1/-1}
.input-area input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-size:16px;outline:none}
.input-area input:focus{border-color:var(--accent)}
.input-area button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:15px;font-weight:500;cursor:pointer}
.input-area button:hover{opacity:0.9}
.input-area button:disabled{opacity:0.4;cursor:not-allowed}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:2px;transition:width 0.3s}
.progress-bar .fill.low{background:var(--red)}.progress-bar .fill.mid{background:var(--yellow)}.progress-bar .fill.high{background:var(--green)}
.milestone{font-size:9px;color:var(--yellow);margin-top:2px;font-weight:500}
.remaining{font-size:9px;color:var(--text-dim);margin-top:1px}
.blocker-alert{font-size:9px;color:var(--red);margin-top:2px;font-weight:500}
.owner-badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.owner-badge.owner{background:rgba(63,185,80,0.2);color:var(--green)}
.owner-badge.readonly{background:rgba(248,81,73,0.15);color:var(--red)}
.ts-badge{font-size:10px;padding:1px 6px;border-radius:3px}
.ts-badge.connected{background:rgba(88,166,255,0.15);color:var(--accent)}
.ts-badge.disconnected{background:rgba(139,148,158,0.1);color:var(--text-dim)}
.input-area.readonly input{opacity:0.4;pointer-events:none}
.input-area.readonly button{opacity:0.3;pointer-events:none}
.idle-badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.idle-badge.active{background:rgba(139,148,158,0.1);color:var(--text-dim)}
.idle-badge.idle{background:rgba(57,211,83,0.15);color:var(--cyan);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.idle-item{padding:3px 6px;border-radius:3px;margin-bottom:2px;background:var(--bg);font-size:9px;border-left:2px solid var(--cyan)}
.idle-item .ih-name{font-weight:500;color:var(--cyan)}.idle-item .ih-result{color:var(--text-dim)}
.settings-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:14px;cursor:pointer;color:var(--text-dim);line-height:1}
.settings-btn:hover{border-color:var(--accent);color:var(--text)}
.settings-panel{display:none;position:fixed;top:50px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;z-index:100;width:260px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.settings-panel.open{display:block}
.settings-panel h3{font-size:13px;margin-bottom:12px;color:var(--text)}
.setting-row{margin-bottom:10px}
.setting-row label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px}
.setting-row input[type=range]{width:100%;accent-color:var(--accent)}
.setting-row .val{float:right;font-size:11px;color:var(--accent)}
.empty{color:var(--text-dim);text-align:center;padding:12px;font-size:11px}
</style>
</head>
<body>
<header>
  <h1>FANEL 指令室</h1>
  <div class="header-badges">
    <span class="idle-badge active" id="idleBadge">Active</span>
    <span class="owner-badge" id="ownerBadge">...</span>
    <span class="ts-badge disconnected" id="tsBadge">TS</span>
    <span class="tb-badge" id="tbBadge">ToolBox: 0</span>
    <span class="hb-badge offline" id="hbBadge">Hayabusa offline</span>
    <div class="status-badge"><span class="status-dot" id="statusDot"></span><span id="statusText">...</span></div>
    <button class="settings-btn" onclick="toggleSettings()" title="設定">&#9881;</button>
  </div>
</header>
<div class="settings-panel" id="settingsPanel">
  <h3>表示設定</h3>
  <div class="setting-row">
    <label>タスク文字サイズ <span class="val" id="valTask">13px</span></label>
    <input type="range" min="9" max="20" value="13" id="fsTask" oninput="applyFS()">
  </div>
  <div class="setting-row">
    <label>ログ文字サイズ <span class="val" id="valLog">12px</span></label>
    <input type="range" min="8" max="18" value="12" id="fsLog" oninput="applyFS()">
  </div>
  <div class="setting-row">
    <label>サイドバー文字サイズ <span class="val" id="valSidebar">11px</span></label>
    <input type="range" min="8" max="16" value="11" id="fsSidebar" oninput="applyFS()">
  </div>
  <div class="setting-row">
    <label>入力欄文字サイズ <span class="val" id="valInput">16px</span></label>
    <input type="range" min="12" max="24" value="16" id="fsInput" oninput="applyFS()">
  </div>
</div>
<main>
  <aside class="sidebar">
    <div><h2>Projects <button onclick="showAddProject()" style="font-size:8px;padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:var(--bg);color:var(--accent);cursor:pointer;float:right">+追加</button></h2><div id="projectList"><div class="empty">...</div></div></div>
    <div><h2>Models <button onclick="showAddModel()" style="font-size:8px;padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:var(--bg);color:var(--accent);cursor:pointer;float:right">+追加</button></h2><div id="modelList"><div class="empty">...</div></div></div>
    <div><h2>ToolBox <button onclick="showAddToolbox()" style="font-size:8px;padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:var(--bg);color:var(--cyan);cursor:pointer;float:right">+追加</button></h2><div id="toolboxList"><div class="empty">なし</div></div></div>
    <div><h2>Idle History</h2><div id="idleHistory"><div class="empty">なし</div></div><button onclick="triggerIdle()" style="margin-top:4px;font-size:9px;padding:2px 8px;border:1px solid var(--border);border-radius:3px;background:var(--bg);color:var(--cyan);cursor:pointer">今すぐ実行</button></div>
  </aside>
  <div class="task-panel"><h2>Tasks</h2><div id="taskList"><div class="empty">タスクなし</div></div></div>
  <div class="content"><div class="logs" id="logArea"><div class="empty">ログなし</div></div></div>
  <div class="input-area">
    <input type="text" id="taskInput" placeholder="タスクを入力..." autocomplete="off">
    <button id="sendBtn">送信</button>
  </div>
</main>
<script>
var API=location.origin,sending=false,answerEditing=false,serverOnline=true;
var pollFast=null,pollSlow=null;

// Element.closest ポリフィル
if(!Element.prototype.closest){Element.prototype.closest=function(s){var el=this;do{if(el.matches(s))return el;el=el.parentElement||el.parentNode;}while(el!==null&&el.nodeType===1);return null;};}

function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function pad(n){return n<10?'0'+n:''+n;}

// Phase 0-1: IME対応共通関数
function handleInputKeydown(e, callback) {
  if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) {
    e.preventDefault();
    callback();
  }
}

// Phase 2-9: エラー表示
function showError(msg) {
  var el = document.getElementById('logArea');
  var div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = '<span class="time">--:--:--</span><span class="level error">error</span><span class="msg">' + esc(msg) + '</span>';
  el.appendChild(div);
}
function handleFetchError(context) {
  return function(err) {
    serverOnline = false;
    var input = document.getElementById('taskInput');
    if (input) input.placeholder = '\u26A0 \u30B5\u30FC\u30D0\u30FC\u306B\u63A5\u7D9A\u3067\u304D\u307E\u305B\u3093';
    showError(context + ': ' + (err.message || err));
  };
}
function markOnline() {
  if (!serverOnline) {
    serverOnline = true;
    var input = document.getElementById('taskInput');
    if (input) input.placeholder = '\u30BF\u30B9\u30AF\u3092\u5165\u529B...';
  }
}

function fetchStatus(){
  fetch(API+'/api/status').then(function(r){return r.json()}).then(function(d){
    markOnline();
    var dot=document.getElementById('statusDot'),txt=document.getElementById('statusText');
    if(d.status==='running'){dot.classList.add('ok');txt.textContent='v'+d.version;}
    else{dot.classList.remove('ok');txt.textContent=d.status;}
    var hb=document.getElementById('hbBadge');
    hb.className='hb-badge '+(d.hayabusa==='online'?'online':'offline');
    hb.textContent='Hayabusa '+(d.hayabusa==='online'?'online':'offline');
    document.getElementById('tbBadge').textContent='ToolBox: '+(d.toolbox_entries||0);
    var ob=document.getElementById('ownerBadge');
    if(d.is_owner){ob.className='owner-badge owner';ob.textContent='Owner';}
    else{ob.className='owner-badge readonly';ob.textContent='\u8AAD\u53D6\u5C02\u7528 ('+esc(d.owner||'')+')'; }
    var tb=document.getElementById('tsBadge');
    if(d.tailscale==='connected'){tb.className='ts-badge connected';tb.textContent='Tailscale';}
    else if(d.tailscale==='disconnected'){tb.className='ts-badge disconnected';tb.textContent='TS\u5207\u65AD';}
    else{tb.className='ts-badge disconnected';tb.textContent='TS\u672A\u88C5';}
    var ib=document.getElementById('idleBadge');
    if(d.idle){ib.className='idle-badge idle';ib.textContent=d.idle_task?'\uD83D\uDD04 '+d.idle_task:'\uD83D\uDD04 \u81EA\u5F8B\u6539\u5584\u4E2D';}
    else{ib.className='idle-badge active';ib.textContent='Active';}
    var ia=document.querySelector('.input-area');
    if(d.tailscale==='connected'&&!d.is_owner){ia.classList.add('readonly');}else{ia.classList.remove('readonly');}
  }).catch(function(){document.getElementById('statusDot').classList.remove('ok');document.getElementById('statusText').textContent='\u5207\u65AD';});
}
function fetchProjects(){
  fetch(API+'/api/projects').then(function(r){return r.json()}).then(function(ps){
    markOnline();
    var el=document.getElementById('projectList');
    if(el.querySelector('.project-edit'))return;
    el.innerHTML=ps.map(function(p){return'<div class="project-item '+(p.status==='active'?'active':'')+'" onclick="editProject(\''+p.id+'\',\''+esc(p.name).replace(/'/g,"\\'")+'\',\''+esc(p.path).replace(/'/g,"\\'")+'\',\''+p.status+'\')"><div class="name">'+esc(p.name)+'<span class="p-status '+p.status+'">'+(p.status==='active'?'ACTIVE':'idle')+'</span></div><div class="path">'+esc(p.path)+'</div></div>';}).join('')||'<div class="empty">\u306A\u3057</div>';
  }).catch(handleFetchError('Projects'));
}
function fetchModels(){
  fetch(API+'/api/models').then(function(r){return r.json()}).then(function(ms){
    markOnline();
    var ml=document.getElementById('modelList');
    if(ml.querySelector('.model-edit'))return;
    ml.innerHTML=ms.map(function(m){
      var st=m.status,info=m.file_size_mb>0?m.file_size_mb+'MB':'';
      if(m.tokens_per_sec>0)info+=' '+m.tokens_per_sec.toFixed(1)+'tok/s';
      return'<div class="model-item layer'+m.layer+'" onclick="editModel(\''+m.id+'\',\''+esc(m.name)+'\','+m.layer+',\''+st+'\')">'
        +'<div class="m-head"><span class="m-name">'+esc(m.name)+'</span><span class="m-layer">L'+m.layer+' '+st+'</span></div>'
        +(info?'<div style="font-size:9px;color:var(--text-dim)">'+info+'</div>':'')
        +'</div>';
    }).join('')||'<div class="empty">\u306A\u3057</div>';
  }).catch(handleFetchError('Models'));
}
function fetchToolbox(){
  fetch(API+'/api/toolbox').then(function(r){return r.json()}).then(function(ts){
    markOnline();
    document.getElementById('toolboxList').innerHTML=ts.map(function(t){
      return'<div class="tb-item"><div class="tb-head"><span class="tb-name">'+esc(t.name)+'</span><span class="tb-count">x'+t.usage_count
        +' <button onclick="event.stopPropagation();executeToolbox(\''+t.id+'\')" style="font-size:9px;padding:0 4px;border:1px solid var(--cyan);border-radius:2px;background:none;color:var(--cyan);cursor:pointer" data-testid="toolbox-run-'+t.id+'">\u25B6</button>'
        +' <button onclick="event.stopPropagation();deleteToolbox(\''+t.id+'\')" style="font-size:9px;padding:0 4px;border:1px solid var(--red);border-radius:2px;background:none;color:var(--red);cursor:pointer" data-testid="toolbox-delete-'+t.id+'">\u00D7</button>'
        +'</span></div><div class="tb-desc">'+esc(t.description)+'</div></div>';
    }).join('')||'<div class="empty">\u306A\u3057</div>';
  }).catch(handleFetchError('ToolBox'));
}
function statusLabel(s){return{draft:'Draft',waitingForCouncil:'\u4F1A\u8B70\u4E2D',waitingForUser:'\u56DE\u7B54\u5F85',running:'\u5B9F\u884C\u4E2D',complete:'\u5B8C\u4E86',error:'\u30A8\u30E9\u30FC',waiting:'\u5F85\u6A5F'}[s]||s;}
function fetchTasks(){
  // Phase 0-1: 回答欄にフォーカスがある場合は再描画スキップ
  var ae=document.activeElement;
  if(answerEditing||(ae&&ae.closest&&ae.closest('.question-box')))return;
  fetch(API+'/api/tasks').then(function(r){return r.json()}).then(function(tasks){
    markOnline();
    var el=document.getElementById('taskList');
    if(!tasks.length){el.innerHTML='<div class="empty">\u30BF\u30B9\u30AF\u306A\u3057</div>';return;}
    el.innerHTML=tasks.map(function(t){
      var s=t.status,h='<div class="task-item '+s+'"><div class="task-head"><span class="task-goal">'+esc(t.goal).substring(0,40)+'</span><span class="task-status '+s+'">'+statusLabel(s)+'</span></div><div class="task-msg">'+esc(t.message)+'</div>';
      if(t.council_result){
        var c=t.council_result;
        if(c.progress_score>=0){
          var cls=c.progress_score<30?'low':c.progress_score<70?'mid':'high';
          h+='<div class="progress-bar"><div class="fill '+cls+'" style="width:'+c.progress_score+'%"></div></div>';
        }
        if(c.current_milestone)h+='<div class="milestone">'+esc(c.current_milestone)+'</div>';
        if(c.estimated_slices>0)h+='<div class="remaining">\u6B8B\u308A'+c.estimated_slices+'\u30B9\u30E9\u30A4\u30B9</div>';
        if(c.remaining_slices&&c.remaining_slices.length)h+='<div class="remaining">\u2192 '+esc(c.remaining_slices.join(', ').substring(0,100))+'</div>';
        if(c.blockers&&c.blockers.length)h+='<div class="blocker-alert">\u26A0 '+esc(c.blockers.join(', '))+'</div>';
        h+='<div class="council-info"><span class="ci-label">Council</span> <span class="ci-row">c='+c.complexity+(c.progress_score>=0?' '+c.progress_score+'%':'')+' '+(c.consensus_reached?'\u5408\u610F':'\u672A\u9054')+'</span></div>';
      }
      // Phase 0-1: インラインハンドラを削除、動的バインドに移行
      if(s==='waitingForUser'&&t.council_result&&t.council_result.questions_for_user&&t.council_result.questions_for_user.length){
        h+='<div class="question-box"><div class="q-text">'+esc(t.council_result.questions_for_user.join('\n'))+'</div><div class="q-input"><input type="text" id="answer-'+t.id+'" placeholder="\u56DE\u7B54..." data-testid="answer-input-'+t.id+'"><button onclick="answerTask(\''+t.id+'\')" data-testid="answer-btn-'+t.id+'">\u56DE\u7B54</button></div></div>';
      }
      h+='</div>';return h;
    }).join('');
    // Phase 2-2: task-msg展開トグル
    document.querySelectorAll('.task-msg').forEach(function(el) {
      el.addEventListener('click', function() { this.classList.toggle('expanded'); });
    });
    // Phase 0-1: 回答欄の動的イベントバインド
    document.querySelectorAll('.question-box input').forEach(function(input) {
      var taskId = input.id.replace('answer-', '');
      input.addEventListener('focus', function() { answerEditing = true; });
      input.addEventListener('blur', function() {
        setTimeout(function() { answerEditing = false; }, 200);
      });
      input.addEventListener('keydown', function(e) {
        handleInputKeydown(e, function() { answerTask(taskId); });
      });
    });
  }).catch(handleFetchError('Tasks'));
}
function fetchLogs(){
  fetch(API+'/api/logs').then(function(r){return r.json()}).then(function(logs){
    markOnline();
    var el=document.getElementById('logArea');
    if(!logs.length){el.innerHTML='<div class="empty">\u30ED\u30B0\u306A\u3057</div>';return;}
    logs=logs.slice(-20);
    el.innerHTML=logs.map(function(l){
      var t=new Date(l.timestamp),ts=pad(t.getHours())+':'+pad(t.getMinutes())+':'+pad(t.getSeconds());
      var isTB=l.message.indexOf('ToolBox')>=0;
      return'<div class="log-entry"><span class="time">'+ts+'</span><span class="level '+l.level+'">'+l.level+'</span><span class="msg'+(isTB?' toolbox-msg':'')+'">'+esc(l.message)+'</span></div>';
    }).join('');
    // Phase 0-2: スマートスクロール（下端付近の時だけ自動スクロール）
    var isNearBottom = (el.scrollHeight - el.scrollTop - el.clientHeight) < 60;
    if (isNearBottom) el.scrollTop = el.scrollHeight;
  }).catch(handleFetchError('Logs'));
}
function sendTask(){
  var input=document.getElementById('taskInput'),btn=document.getElementById('sendBtn'),goal=input.value.trim();
  if(!goal||sending)return;
  sending=true;btn.disabled=true;btn.textContent='\u51E6\u7406\u4E2D...';input.value='';
  fetch(API+'/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal:goal})})
    .then(function(r){return r.json()}).then(function(envelope){
      sending=false;btn.disabled=false;btn.textContent='\u9001\u4FE1';
      // Phase 2-3: レスポンスをインライン仮表示
      if(envelope&&envelope.id){
        var el=document.getElementById('taskList');
        var empty=el.querySelector('.empty');
        if(empty)el.innerHTML='';
        var s=envelope.status||'draft';
        var div=document.createElement('div');
        div.className='task-item '+s;
        div.style.opacity='0.7';
        div.innerHTML='<div class="task-head"><span class="task-goal">'+esc(envelope.goal||goal).substring(0,40)+'</span><span class="task-status '+s+'">'+statusLabel(s)+'</span></div><div class="task-msg">'+esc(envelope.message||'\u51E6\u7406\u4E2D...')+'</div>';
        el.insertBefore(div,el.firstChild);
      }
      fetchTasks();fetchLogs();fetchToolbox();input.focus();
    })
    .catch(function(err){sending=false;btn.disabled=false;btn.textContent='\u9001\u4FE1';input.focus();handleFetchError('SendTask')(err);});
}
function answerTask(id){
  var input=document.getElementById('answer-'+id);if(!input)return;
  var a=input.value.trim();if(!a)return;
  input.disabled=true;
  // Phase 0-1: disabled中のポーリング再描画による二重送信防止
  answerEditing=true;
  fetch(API+'/api/tasks/'+id+'/answer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answer:a})})
    .then(function(){answerEditing=false;fetchTasks();fetchLogs();})
    .catch(function(err){input.disabled=false;answerEditing=false;handleFetchError('Answer')(err);});
}
function fetchIdleHistory(){
  fetch(API+'/api/idle/history').then(function(r){return r.json()}).then(function(hs){
    markOnline();
    var el=document.getElementById('idleHistory');
    if(!hs.length){el.innerHTML='<div class="empty">\u306A\u3057</div>';return;}
    el.innerHTML=hs.map(function(h){return'<div class="idle-item"><span class="ih-name">'+esc(h.task_name)+'</span> <span class="ih-result">'+esc(h.result).substring(0,60)+'</span></div>';}).join('');
  }).catch(handleFetchError('IdleHistory'));
}
function activateProject(id){fetch(API+'/api/projects/'+id+'/activate',{method:'POST'}).then(function(){fetchProjects();fetchLogs();}).catch(handleFetchError('ActivateProject'));}
function editProject(id,name,path,status){
  var el=document.getElementById('projectList');
  el.innerHTML='<div class="project-edit"><input type="text" id="pe-name" value="'+name+'" placeholder="\u30D7\u30ED\u30B8\u30A7\u30AF\u30C8\u540D"><input type="text" id="pe-path" value="'+path+'" placeholder="\u30D1\u30B9"><div class="pe-buttons">'
    +'<button class="pe-save" onclick="saveProject(\''+id+'\')" data-testid="project-save">保存</button>'
    +'<button class="pe-activate" onclick="activateProject(\''+id+'\');fetchProjects();" data-testid="project-activate">切替</button>'
    +'<button class="pe-delete" onclick="deleteProject(\''+id+'\')" data-testid="project-delete">削除</button>'
    +'<button class="pe-cancel" onclick="fetchProjects()" data-testid="project-cancel">閉じる</button>'
    +'</div></div>';
  document.getElementById('pe-name').focus();
}
function saveProject(id){
  var n=document.getElementById('pe-name').value.trim(),p=document.getElementById('pe-path').value.trim();
  if(!n)return;
  fetch(API+'/api/projects/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,path:p})}).then(function(){fetchProjects();fetchLogs();}).catch(handleFetchError('SaveProject'));
}
// Phase 2-1: プロジェクト追加
function showAddProject(){
  var el=document.getElementById('projectList');
  el.innerHTML='<div class="project-edit"><input type="text" id="pe-add-name" placeholder="\u30D7\u30ED\u30B8\u30A7\u30AF\u30C8\u540D"><input type="text" id="pe-add-path" placeholder="/Users/you/projects/xxx"><div class="pe-buttons">'
    +'<button class="pe-save" onclick="addProject()" data-testid="project-add-save">\u4FDD\u5B58</button>'
    +'<button class="pe-cancel" onclick="fetchProjects()" data-testid="project-add-cancel">\u9589\u3058\u308B</button>'
    +'</div></div>';
  document.getElementById('pe-add-name').focus();
}
function addProject(){
  var n=document.getElementById('pe-add-name').value.trim(),p=document.getElementById('pe-add-path').value.trim();
  if(!n||!p)return;
  fetch(API+'/api/projects',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,path:p})}).then(function(){fetchProjects();fetchLogs();}).catch(handleFetchError('AddProject'));
}
function editModel(id,name,layer,status){
  var el=document.getElementById('modelList');
  el.innerHTML='<div class="model-edit"><input type="text" id="me-name" value="'+name+'" placeholder="\u30E2\u30C7\u30EB\u540D">'
    +'<div style="display:flex;gap:4px"><select id="me-layer"><option value="1"'+(layer===1?' selected':'')+'>Layer 1</option><option value="2"'+(layer===2?' selected':'')+'>Layer 2</option><option value="3"'+(layer===3?' selected':'')+'>Layer 3</option><option value="4"'+(layer===4?' selected':'')+'>Layer 4</option></select>'
    +'<select id="me-status"><option value="active"'+(status==='active'?' selected':'')+'>active</option><option value="inactive"'+(status==='inactive'?' selected':'')+'>inactive</option><option value="experimental"'+(status==='experimental'?' selected':'')+'>experimental</option></select></div>'
    +'<div class="me-buttons">'
    +'<button class="pe-save" onclick="saveModel(\''+id+'\')" data-testid="model-save">\u4FDD\u5B58</button>'
    +'<button class="pe-activate" onclick="benchmarkModel(\''+id+'\')" data-testid="model-bench">\u30D9\u30F3\u30C1</button>'
    +(status==='active'?'<button class="pe-delete" onclick="disableModel(\''+id+'\')" data-testid="model-disable">\u7121\u52B9\u5316</button>':'<button class="pe-activate" onclick="enableModel(\''+id+'\')" data-testid="model-enable">\u6709\u52B9\u5316</button>')
    +'<button class="pe-cancel" onclick="fetchModels()" data-testid="model-cancel">\u9589\u3058\u308B</button>'
    +'</div></div>';
}
function saveModel(id){
  var n=document.getElementById('me-name').value.trim(),l=parseInt(document.getElementById('me-layer').value),s=document.getElementById('me-status').value;
  fetch(API+'/api/models/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,layer:l,status:s})}).then(function(){fetchModels();fetchLogs();}).catch(handleFetchError('SaveModel'));
}
function enableModel(id){fetch(API+'/api/models/'+id+'/enable',{method:'POST'}).then(function(){fetchModels();}).catch(handleFetchError('EnableModel'));}
function disableModel(id){fetch(API+'/api/models/'+id+'/disable',{method:'POST'}).then(function(){fetchModels();}).catch(handleFetchError('DisableModel'));}
function benchmarkModel(id){fetch(API+'/api/models/'+id+'/benchmark',{method:'POST'}).then(function(){fetchModels();fetchLogs();}).catch(handleFetchError('Benchmark'));}
function showAddModel(){
  var el=document.getElementById('modelList');
  el.innerHTML='<div class="model-edit"><input type="text" id="me-add-name" placeholder="\u30E2\u30C7\u30EB\u540D\uFF08\u4F8B: qwen3-7b\uFF09">'
    +'<input type="text" id="me-add-path" placeholder="GGUF\u30D5\u30A1\u30A4\u30EB\u30D1\u30B9">'
    +'<select id="me-add-layer"><option value="1">Layer 1</option><option value="2" selected>Layer 2</option><option value="3">Layer 3</option></select>'
    +'<div class="me-buttons"><button class="pe-save" onclick="addModel()" data-testid="model-add-save">\u8FFD\u52A0</button><button class="pe-cancel" onclick="fetchModels()" data-testid="model-add-cancel">\u9589\u3058\u308B</button></div></div>';
  document.getElementById('me-add-name').focus();
}
function addModel(){
  var n=document.getElementById('me-add-name').value.trim(),p=document.getElementById('me-add-path').value.trim(),l=parseInt(document.getElementById('me-add-layer').value);
  if(!n)return;
  fetch(API+'/api/models',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,path:p,layer:l})}).then(function(){fetchModels();fetchLogs();}).catch(handleFetchError('AddModel'));
}
function deleteProject(id){
  if(!confirm('\u3053\u306E\u30D7\u30ED\u30B8\u30A7\u30AF\u30C8\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F'))return;
  fetch(API+'/api/projects/'+id,{method:'DELETE'}).then(function(){fetchProjects();fetchLogs();}).catch(handleFetchError('DeleteProject'));
}
// Phase 2-4: ToolBox追加・削除・実行
function showAddToolbox(){
  var el=document.getElementById('toolboxList');
  el.innerHTML='<div class="model-edit"><input type="text" id="tb-add-name" placeholder="\u30C4\u30FC\u30EB\u540D">'
    +'<input type="text" id="tb-add-desc" placeholder="\u8AAC\u660E">'
    +'<textarea id="tb-add-script" placeholder="\u30B9\u30AF\u30EA\u30D7\u30C8\u5185\u5BB9" style="width:100%;height:60px;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:4px;color:var(--text);font-size:10px;font-family:monospace;resize:vertical"></textarea>'
    +'<div class="me-buttons"><button class="pe-save" onclick="addToolbox()" data-testid="toolbox-add-save">\u8FFD\u52A0</button><button class="pe-cancel" onclick="fetchToolbox()" data-testid="toolbox-add-cancel">\u9589\u3058\u308B</button></div></div>';
  document.getElementById('tb-add-name').focus();
}
function addToolbox(){
  var n=document.getElementById('tb-add-name').value.trim(),d=document.getElementById('tb-add-desc').value.trim(),s=document.getElementById('tb-add-script').value.trim();
  if(!n||!s)return;
  fetch(API+'/api/toolbox',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,description:d,script:s})}).then(function(){fetchToolbox();fetchLogs();}).catch(handleFetchError('AddToolbox'));
}
function executeToolbox(id){
  fetch(API+'/api/toolbox/'+id+'/execute',{method:'POST'}).then(function(r){return r.json()}).then(function(res){
    if(res&&res.result)showError('ToolBox\u5B9F\u884C\u7D50\u679C: '+res.result);
    fetchLogs();
  }).catch(handleFetchError('ExecuteToolbox'));
}
function deleteToolbox(id){
  if(!confirm('\u3053\u306EToolBox\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F'))return;
  fetch(API+'/api/toolbox/'+id,{method:'DELETE'}).then(function(){fetchToolbox();fetchLogs();}).catch(handleFetchError('DeleteToolbox'));
}
function triggerIdle(){fetch(API+'/api/idle/resume',{method:'POST'}).then(function(){fetchLogs();}).catch(handleFetchError('TriggerIdle'));}
// Settings
function toggleSettings(){document.getElementById('settingsPanel').classList.toggle('open');}
function applyFS(){
  var t=document.getElementById('fsTask').value,l=document.getElementById('fsLog').value,s=document.getElementById('fsSidebar').value,i=document.getElementById('fsInput').value;
  document.documentElement.style.setProperty('--fs-task',t+'px');
  document.documentElement.style.setProperty('--fs-log',l+'px');
  document.documentElement.style.setProperty('--fs-sidebar',s+'px');
  document.querySelector('.input-area input').style.fontSize=i+'px';
  document.getElementById('valTask').textContent=t+'px';
  document.getElementById('valLog').textContent=l+'px';
  document.getElementById('valSidebar').textContent=s+'px';
  document.getElementById('valInput').textContent=i+'px';
  try{localStorage.setItem('fanel-fs',JSON.stringify({t:t,l:l,s:s,i:i}));}catch(e){}
}
function loadFS(){
  try{var d=JSON.parse(localStorage.getItem('fanel-fs'));if(!d)return;
  document.getElementById('fsTask').value=d.t;document.getElementById('fsLog').value=d.l;document.getElementById('fsSidebar').value=d.s;document.getElementById('fsInput').value=d.i;applyFS();}catch(e){}
}
loadFS();
// Phase 0-1: IME対応（compositionstart/end廃止、handleInputKeydown使用）
document.getElementById('sendBtn').addEventListener('click',sendTask);
document.getElementById('taskInput').addEventListener('keydown',function(e){
  handleInputKeydown(e, sendTask);
});

// Phase 2-8: ポーリング最適化（高頻度/低頻度を分離 + バックグラウンドタブ時停止）
function startPolling(){
  pollFast=setInterval(function(){fetchLogs();fetchStatus();fetchTasks();},3000);
  pollSlow=setInterval(function(){fetchToolbox();fetchIdleHistory();},10000);
}
function stopPolling(){
  if(pollFast){clearInterval(pollFast);pollFast=null;}
  if(pollSlow){clearInterval(pollSlow);pollSlow=null;}
}
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    stopPolling();
  } else {
    startPolling();
    fetchStatus();fetchTasks();fetchLogs();
  }
});

fetchStatus();fetchProjects();fetchModels();fetchToolbox();fetchTasks();fetchLogs();fetchIdleHistory();
startPolling();
</script>
